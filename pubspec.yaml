name: edutrack
description: EduTrack - Student & Lecturer Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  iconsax: ^0.0.8
  shared_preferences: ^2.2.2
  image_picker: ^1.2.2
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_data_connect: any
  file_picker: ^11.0.2
  csv: ^8.0.0
  intl: ^0.20.3
  url_launcher: ^6.3.2
  web: ^1.1.0
  firebase_storage: ^13.4.3
  http: ^1.6.0
  pdf: ^3.11.1
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
